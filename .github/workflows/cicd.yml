name: CICD
on:
    workflow_dispatch: 
jobs:
        code:
            runs-on: ubuntu-latest
            steps:
            - name: checkout code
              run: echo "code clone from github"
        build:
            needs: [code]
            runs-on: ubuntu-latest
            steps:
            - name: build docker container
              run: echo "docker container biuld"
        test:
            needs: [build]
            runs-on: ubuntu-latest
            steps:
            - name: test the container
              run: echo "testing the container"
        deploy:
            needs: [build,test]
            runs-on: ubuntu-latest
            steps:
            - name: deploy the app
              run: echo "docker compose deploying the app"
    
      
